import com.mmodding.gradle.api.EnvironmentTarget

plugins {
	id 'maven-publish'
	alias libs.plugins.fabric.loom
	alias libs.plugins.mmodding.gradle
}

version = "$project.mod_version+${libs.versions.minecraft.get()}"
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
	maven {
		name = "JitPack"
		url = "https://jitpack.io"
	}
	maven {
		name = "QuiltMC"
		url = "https://maven.quiltmc.org/repository/release"
	}
}

dependencies {
	minecraft libs.minecraft
	implementation libs.fabric.loader

	implementation libs.mmodding
	implementation libs.fabric.api
}

fabricApi {
	configureDataGeneration() {
		client = true
	}
}

loom {
	mods {
		"psithurism" {
			sourceSet("main")
		}
	}
}

mmodding {
	configureFabricModJson {
		name = "Psithurism"
		namespace = "psithurism"
		description = "Bring Japanese culture into your home with new deco blocks, new food, traditional cosmetics and much more!"
		group = "com.mmodding"
		icon = "assets/psithurism/icon.png"
		license = "Code: PolyForm-Shield-1.0.0\\nAssets: All Rights Reserved"
		addAuthor("MModding Team")
		addContributor("Aethyus (Art Director, Project Manager)")
		addContributor("Aeramisu (Art Director, Project Manager)")
		addContributor("FirstMegaGame4 (Lead Developer, Project Manager)")
		withContact {
			it.homepage = "https://mmodding.com"
			it.sources = "https://github.com/MModding/delicate-sip"
			it.issues = "https://github.com/MModding/delicate-sip/issues"
		}
		environment = EnvironmentTarget.ANY
		withEntrypoints {
			it.init("com.mmodding.psithurism.Psithurism")
			it.client("com.mmodding.psithurism.client.PsithurismClient")
			it.custom("fabric-datagen", "com.mmodding.psithurism.PsithurismDataGenerator")
		}
		addMixin("psithurism.mixins.json")
		withDependencies {
			it.javaVersion = ">=" + libs.versions.java.get()
			it.minecraftVersion = "~" + libs.versions.minecraft.get()
			it.fabricLoaderVersion = ">=" + libs.versions.fabric.loader.get()
			it.fabricApiVersion = ">=" + libs.versions.fabric.api.get()
			it.mmoddingLibraryVersion = ">=" + libs.versions.mmodding.get() + "-"
		}
	}
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	inputs.property "archivesName", project.name

	from("LICENSE") {
		rename { "${it}_${project.name}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}